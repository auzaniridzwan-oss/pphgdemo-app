<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pan Pacific — Singapore Stays</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#AC8B45',
            secondary: '#1A1A1A',
            'text-main': '#FFFFFF',
            'text-muted': '#A0A0A0',
            'accent-discount': '#AC8B45',
            'border-app': '#333333',
          },
          spacing: {
            'base': '8px',
            'container': '16px',
            'card-gap': '12px',
            'safe-t': '47px',
            'safe-b': '34px',
          },
          borderRadius: {
            'sm-app': '4px',
            'md-app': '8px',
            'lg-app': '12px',
            'round': '50%',
          }
        }
      }
    }
  </script>

  <!-- FontAwesome Kit -->
  <script src="https://kit.fontawesome.com/a21f98a3f6.js" crossorigin="anonymous" defer></script>

  <!-- App Styles: base frame + PPHG theme & components -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/pphg-theme.css">
  <link rel="stylesheet" href="css/pphg-components.css">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen antialiased text-gray-900 select-none">

  <!-- Debug / Reset Bar (outside phone frame) -->
  <div id="app-toolbar"
    class="fixed top-0 left-0 right-0 z-[200] flex flex-wrap items-center justify-center gap-x-4 gap-y-2 py-2 px-3 bg-gray-800 text-white text-xs">
    <span class="font-semibold tracking-wide shrink-0">Pan Pacific Hotel Group — Demo</span>
    <div class="flex items-center gap-1 shrink-0" role="group" aria-label="Auth mode">
      <span class="opacity-70 uppercase tracking-wider text-[10px] mr-1">Mode</span>
      <button type="button" id="btn-mode-demo"
        class="min-h-[44px] min-w-[44px] px-3 rounded transition-colors font-medium hover:text-yellow-300"
        aria-pressed="true">Demo</button>
      <button type="button" id="btn-mode-live"
        class="min-h-[44px] min-w-[44px] px-3 rounded transition-colors font-medium hover:text-yellow-300"
        aria-pressed="false">Live</button>
    </div>
    <button type="button" id="btn-login"
      class="min-h-[44px] px-3 rounded border border-white/30 hover:bg-white/10 transition-colors shrink-0"
      aria-label="Log in">Log in</button>
    <button type="button" id="btn-logout"
      class="hidden min-h-[44px] px-3 rounded border border-white/30 hover:bg-white/10 transition-colors shrink-0"
      aria-label="Log out">Log out</button>
    <button id="btn-debug" class="min-h-[44px] px-2 hover:text-yellow-300 transition-colors cursor-pointer shrink-0"
      aria-label="Open Debug Overlay">
      <i class="fa-solid fa-bug" aria-hidden="true"></i> Debug
    </button>
    <button id="btn-reset" class="min-h-[44px] px-2 hover:text-red-300 transition-colors cursor-pointer shrink-0"
      aria-label="Reset App">
      <i class="fa-solid fa-rotate-right" aria-hidden="true"></i> Reset
    </button>
  </div>

  <!-- Live login (external_id) — outside phone frame -->
  <div id="live-login-backdrop" class="hidden fixed inset-0 z-[250] bg-black/50 flex items-center justify-center p-4"
    aria-hidden="true">
    <div id="live-login-dialog" class="bg-white text-gray-900 rounded-lg shadow-xl max-w-md w-full p-5" role="dialog"
      aria-labelledby="live-login-title" aria-modal="true">
      <h2 id="live-login-title" class="text-sm font-semibold uppercase tracking-wide mb-3">Live mode — sign in</h2>
      <p class="text-xs text-gray-600 mb-3">Enter the Braze external ID. Profile fields load from Braze via the API.</p>
      <label for="live-external-id" class="block text-xs font-medium text-gray-700 mb-1">External ID</label>
      <input id="live-external-id" type="text" autocomplete="username"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm mb-4 min-h-[44px]" placeholder="e.g. pphg_demo_sg_01" />
      <div class="flex gap-2 justify-end">
        <button type="button" id="live-login-cancel"
          class="min-h-[44px] px-4 rounded border border-gray-300 text-sm font-medium hover:bg-gray-50">Cancel</button>
        <button type="button" id="live-login-submit"
          class="min-h-[44px] px-4 rounded bg-gray-800 text-white text-sm font-medium hover:bg-gray-700">Log in</button>
      </div>
    </div>
  </div>

  <!-- iPhone Frame -->
  <div id="phone-frame">
    <!-- Header (injected by JS) -->
    <div id="app-header"></div>

    <!-- Main scrollable content area -->
    <div id="app-content"></div>

    <!-- Bottom Navigation (injected by JS) -->
    <div id="app-nav"></div>
  </div>

  <!-- Debug Overlay (outside phone frame) -->
  <div id="debug-overlay" class="hidden"></div>

  <!-- App Scripts (ES Modules) -->
  <script type="module" src="js/main.js"></script>
</body>

</html>
